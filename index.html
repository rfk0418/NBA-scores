<!DOCTYPE html>
<html>
<head>
  <title>NBA Scores</title>
  <script>
    const today = new Date();

    const monthName = today.toLocaleString('default', { month: 'long' });
    const day = today.getDate();
    const year = today.getFullYear();

    const formatted = `NBA Scores - ${monthName} ${day}, ${year}`;

    // Set page title
    document.title = formatted;

    // Wait until page loads to safely update h1
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('page-header').textContent = formatted;
    });
  </script>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="page-header">NBA Scores for</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="teamLocations.js"></script>
<script src="script.js"></script>

</body>
</html>
